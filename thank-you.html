<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - LisPendensData</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%231a3a5c' width='32' height='32' rx='6'/%3E%3Ctext x='50%25' y='55%25' font-size='14' text-anchor='middle' fill='%23c9a227' font-weight='bold' dominant-baseline='middle'%3EL%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --navy: #1a3a5c;
      --green: #2d5a3d;
      --gold: #c9a227;
      --white: #ffffff;
      --light: #f8f9fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--light); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .thank-you-card { background: var(--white); border-radius: 16px; padding: 60px 50px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
    .checkmark { width: 80px; height: 80px; background: var(--green); border-radius: 50%; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; }
    .checkmark::after { content: '✓'; font-size: 3rem; color: white; }
    h1 { color: var(--navy); font-size: 1.8rem; margin-bottom: 15px; }
    p { color: #666; line-height: 1.6; margin-bottom: 30px; }
    .btn { display: inline-block; padding: 14px 35px; background: var(--gold); color: var(--navy); text-decoration: none; border-radius: 8px; font-weight: 700; transition: all 0.3s; }
    .btn:hover { background: #b8941f; transform: translateY(-2px); }
    .phone { margin-top: 25px; padding-top: 25px; border-top: 1px solid #eee; }
    .phone-number { font-size: 1.3rem; font-weight: 700; color: var(--navy); }
    .phone-label { color: #888; font-size: 0.9rem; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="checkmark"></div>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully. We'll get back to you as soon as possible — usually within 24 hours.</p>
    <a href="./" class="btn">← Back to Home</a>
    <div class="phone">
      <div class="phone-number">📞 (850) 998-8500</div>
      <div class="phone-label">Prefer to call? We're here to help.</div>
    </div>
  </div>
</body>
</html>
