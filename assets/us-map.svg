<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="flGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa"/>
  <rect width="900" height="600" fill="#1a3a5c" fill-opacity="0.03"/>

  <!-- Styling -->
  <style>
    .state { stroke: #fff; stroke-width: 1.5; transition: all 0.3s ease; cursor: pointer; }
    .state:hover { filter: drop-shadow(0 0 8px rgba(26,58,92,0.4)); stroke-width: 2.5; transform: scale(1.02); transform-origin: center; }
    .state.coming { fill: #3d7a4d; }
    .state.coming:hover { fill: #2a5a3d; }
    .state.live { fill: url(#flGradient); }
    .state.live:hover { filter: drop-shadow(0 0 10px rgba(201,162,39,0.6)); }
    text { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 700; pointer-events: none; fill: white; font-size: 13px; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
    .live-text { fill: #1a3a5c; font-size: 16px; font-weight: 800; text-shadow: none; }
    .pulse-circle { fill: #1a3a5c; }
    @keyframes pulse { 0%, 100% { r: 6; opacity: 1; } 50% { r: 14; opacity: 0.3; } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Group: West (not in 21) - faint background hint -->
  <g opacity="0.15">
    <path fill="#ccc" d="M 50,180 L 120,175 L 140,250 L 110,320 L 60,300 Z"/>
    <path fill="#ccc" d="M 60,80 L 180,70 L 200,180 L 120,175 L 50,180 Z"/>
    <path fill="#ccc" d="M 50,300 L 140,290 L 160,380 L 90,390 Z"/>
    <path fill="#ccc" d="M 120,60 L 280,50 L 300,140 L 220,150 L 180,70 Z"/>
    <path fill="#ccc" d="M 180,150 L 350,140 L 370,250 L 280,260 L 200,180 Z"/>
    <path fill="#ccc" d="M 280,260 L 370,250 L 390,340 L 320,350 L 260,290 Z"/>
  </g>

  <!-- === NORTHEAST (6 states) === -->

  <!-- Maine - distinctive panhandle shape -->
  <g class="state-group" data-state="ME">
    <path class="state coming" d="M 760,45 L 795,25 L 820,35 L 825,65 L 810,95 L 790,110 L 775,105 L 765,85 L 755,70 L 750,55 Z"/>
    <text x="785" y="75">ME</text>
  </g>

  <!-- Vermont - long narrow shape -->
  <g class="state-group" data-state="VT">
    <path class="state coming" d="M 705,85 L 745,70 L 750,120 L 735,145 L 700,135 L 695,95 Z"/>
    <text x="720" y="115">VT</text>
  </g>

  <!-- New York - distinctive long shape with finger lakes area -->
  <g class="state-group" data-state="NY">
    <path class="state coming" d="M 620,60 L 695,45 L 710,70 L 705,120 L 685,145 L 655,160 L 630,155 L 610,130 L 605,90 L 615,65 Z"/>
    <text x="655" y="105">NY</text>
  </g>

  <!-- Pennsylvania - keystone shape -->
  <g class="state-group" data-state="PA">
    <path class="state coming" d="M 600,145 L 670,130 L 695,150 L 690,195 L 645,210 L 605,200 L 590,165 Z"/>
    <text x="640" y="175">PA</text>
  </g>

  <!-- New Jersey - coastal shape -->
  <g class="state-group" data-state="NJ">
    <path class="state coming" d="M 690,165 L 720,155 L 730,195 L 710,215 L 685,205 L 680,175 Z"/>
    <text x="700" y="185">NJ</text>
  </g>

  <!-- Connecticut - small coastal -->
  <g class="state-group" data-state="CT">
    <path class="state coming" d="M 700,155 L 745,145 L 750,165 L 710,178 L 695,168 Z"/>
    <text x="720" y="164">CT</text>
  </g>

  <!-- Delaware - tiny diamond -->
  <g class="state-group" data-state="DE">
    <path class="state coming" d="M 670,205 L 690,200 L 700,215 L 685,225 L 665,218 Z"/>
    <text x="680" y="213" font-size="10">DE</text>
  </g>

  <!-- === MIDWEST (6 states) === -->

  <!-- North Dakota - flat top, squared -->
  <g class="state-group" data-state="ND">
    <path class="state coming" d="M 320,80 L 450,70 L 460,130 L 440,160 L 330,165 L 315,115 Z"/>
    <text x="385" y="120">ND</text>
  </g>

  <!-- Wisconsin - mitten shape -->
  <g class="state-group" data-state="WI">
    <path class="state coming" d="M 455,115 L 510,105 L 530,185 L 500,220 L 465,210 L 445,175 L 440,140 Z"/>
    <text x="485" y="160">WI</text>
  </g>

  <!-- Iowa - regular rectangular -->
  <g class="state-group" data-state="IA">
    <path class="state coming" d="M 410,220 L 485,210 L 495,275 L 430,285 L 400,260 Z"/>
    <text x="445" y="248">IA</text>
  </g>

  <!-- Illinois - long with Chicago bump -->
  <g class="state-group" data-state="IL">
    <path class="state coming" d="M 485,210 L 545,200 L 560,280 L 535,340 L 500,345 L 480,290 L 475,240 Z"/>
    <text x="515" y="275">IL</text>
  </g>

  <!-- Indiana - blocky, regular -->
  <g class="state-group" data-state="IN">
    <path class="state coming" d="M 545,200 L 595,190 L 605,280 L 560,290 L 550,230 Z"/>
    <text x="575" y="245">IN</text>
  </g>

  <!-- Ohio - distinctive shape with Lake Erie coast -->
  <g class="state-group" data-state="OH">
    <path class="state coming" d="M 595,190 L 660,175 L 680,240 L 665,290 L 610,295 L 595,250 Z"/>
    <text x="630" y="240">OH</text>
  </g>

  <!-- === SOUTH (4 states) === -->

  <!-- Kentucky - distinctive shape with panhandle -->
  <g class="state-group" data-state="KY">
    <path class="state coming" d="M 495,300 L 585,280 L 600,320 L 550,355 L 475,350 L 465,320 Z"/>
    <text x="535" y="320">KY</text>
  </g>

  <!-- South Carolina - coastal, distinctive -->
  <g class="state-group" data-state="SC">
    <path class="state coming" d="M 620,380 L 680,365 L 700,420 L 665,450 L 625,430 L 610,395 Z"/>
    <text x="655" y="405">SC</text>
  </g>

  <!-- Louisiana - boot shape with delta -->
  <g class="state-group" data-state="LA">
    <path class="state coming" d="M 440,450 L 510,440 L 530,480 L 520,520 L 440,530 L 425,490 Z"/>
    <text x="480" y="485">LA</text>
  </g>

  <!-- FLORIDA - LIVE: distinctive peninsula with panhandle -->
  <g class="state-group" data-state="FL">
    <path class="state live" d="M 520,440 L 605,420 L 640,460 L 620,520 L 570,565 L 520,570 L 480,540 L 465,480 L 495,450 Z"/>
    <!-- Pulsing indicator -->
    <circle cx="575" cy="495" class="pulse-circle animate-pulse"/>
    <!-- FL Label -->
    <text x="555" y="505" class="live-text">FL</text>
    <text x="555" y="524" class="live-text" font-size="11" font-weight="600">LIVE</text>
  </g>

  <!-- === SOUTHWEST + HAWAII (5 states) === -->

  <!-- Oklahoma - panhandle shape -->
  <g class="state-group" data-state="OK">
    <path class="state coming" d="M 380,390 L 470,375 L 485,440 L 440,455 L 370,440 Z"/>
    <text x="425" y="415">OK</text>
  </g>

  <!-- Texas - distinctive large shape -->
  <g class="state-group" data-state="TX">
    <path class="state coming" d="M 350,445 L 470,430 L 510,480 L 480,520 L 430,530 L 380,520 L 340,480 L 335,460 Z"/>
    <text x="415" y="485">TX</text>
  </g>

  <!-- New Mexico - square with slight angle -->
  <g class="state-group" data-state="NM">
    <path class="state coming" d="M 230,390 L 340,375 L 350,460 L 250,475 L 225,425 Z"/>
    <text x="285" y="425">NM</text>
  </g>

  <!-- Hawaii - island chain in Pacific -->
  <g class="state-group" data-state="HI" transform="translate(100, 500)">
    <ellipse class="state coming" cx="40" cy="25" rx="80" ry="35"/>
    <text x="40" y="30">HI</text>
  </g>

  <!-- === LEGEND === -->
  <g transform="translate(60, 560)">
    <rect x="0" y="0" width="28" height="20" fill="url(#flGradient)" rx="4" stroke="#1a3a5c" stroke-width="0.5"/>
    <text x="38" y="16" fill="#1a3a5c" font-size="14" font-weight="600">Live Now (Florida)</text>
    <rect x="220" y="0" width="28" height="20" fill="#3d7a4d" rx="4"/>
    <text x="258" y="16" fill="#1a3a5c" font-size="14" font-weight="500">Coming 2024-2025</text>
  </g>

  <!-- === TITLE === -->
  <text x="450" y="35" text-anchor="middle" fill="#1a3a5c" font-size="26" font-weight="700" font-family="-apple-system, sans-serif">LisPendensData Coverage</text>
  <text x="450" y="60" text-anchor="middle" fill="#666" font-size="14" font-family="-apple-system, sans-serif">21 States • 2,000+ Counties • Weekly &amp; Daily Data</text>

  <!-- === INTERACTIVE SCRIPT === -->
  <script>//<![CDATA[
    document.querySelectorAll(".state-group").forEach(function(g) {
      g.addEventListener("click", function() {
        var s = this.getAttribute("data-state");
        if (s === "FL") { window.parent.location.href = "/"; }
        else { alert(s + " - Coming soon!"); }
      });
    });
  //]]></script>
</svg>