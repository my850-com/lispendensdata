<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .state { stroke: white; stroke-width: 2; transition: all 0.3s; cursor: pointer; }
      .state:hover { filter: brightness(1.2); transform: scale(1.02); }
      .live { fill: #c9a227; }
      .live:hover { fill: #b8941f; }
      .coming { fill: #2d5a3d; }
      .coming:hover { fill: #1a3a5c; }
      text { font-family: -apple-system, sans-serif; font-weight: 600; pointer-events: none; }
      .pulse { animation: pulse 2s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#1a3a5c" font-size="22" font-weight="700">21 States Covered</text>
  
  <!-- Geographic Groupings -->
  
  <!-- Northeast Group -->
  <g transform="translate(580, 60)">
    <rect class="state coming" x="0" y="0" width="50" height="35" rx="4"/> <!-- ME -->
    <text x="25" y="22" text-anchor="middle" fill="white" font-size="11">ME</text>
    
    <rect class="state coming" x="-45" y="40" width="45" height="30" rx="4"/> <!-- VT -->
    <text x="-22" y="58" text-anchor="middle" fill="white" font-size="10">VT</text>
    
    <rect class="state coming" x="5" y="40" width="50" height="30" rx="4"/> <!-- NH -->
    <text x="30" y="58" text-anchor="middle" fill="white" font-size="10">NH</text>
    
    <rect class="state coming" x="-40" y="75" width="40" height="25" rx="4"/> <!-- MA -->
    <text x="-20" y="91" text-anchor="middle" fill="white" font-size="9">MA</text>
    
    <rect class="state coming" x="5" y="75" width="35" height="25" rx="4"/> <!-- CT -->
    <text x="22" y="91" text-anchor="middle" fill="white" font-size="9">CT</text>
    
    <rect class="state coming" x="-40" y="105" width="45" height="25" rx="4"/> <!-- RI -->
    <text x="-17" y="121" text-anchor="middle" fill="white" font-size="8">RI</text>
    
    <rect class="state coming" x="-80" y="40" width="35" height="60" rx="4"/> <!-- NY -->
    <text x="-62" y="75" text-anchor="middle" fill="white" font-size="12">NY</text>
    
    <rect class="state coming" x="-120" y="90" width="35" height="50" rx="4"/> <!-- PA -->
    <text x="-102" y="120" text-anchor="middle" fill="white" font-size="12">PA</text>
    
    <rect class="state coming" x="-80" y="145" width="35" height="25" rx="4"/> <!-- NJ -->
    <text x="-62" y="161" text-anchor="middle" fill="white" font-size="9">NJ</text>
    
    <rect class="state coming" x="-125" y="145" width="40" height="20" rx="4"/> <!-- DE -->
    <text x="-105" y="158" text-anchor="middle" fill="white" font-size="9">DE</text>
  </g>
  
  <!-- Midwest Group -->
  <g transform="translate(320, 80)">
    <rect class="state coming" x="0" y="0" width="80" height="50" rx="4"/> <!-- WI -->
    <text x="40" y="30" text-anchor="middle" fill="white" font-size="14">WI</text>
    
    <rect class="state coming" x="-80" y="10" width="70" height="40" rx="4"/> <!-- MN -->
    <text x="-45" y="35" text-anchor="middle" fill="white" font-size="12">MN</text>
    
    <rect class="state coming" x="-140" y="15" width="55" height="35" rx="4"/> <!-- ND -->
    <text x="-112" y="38" text-anchor="middle" fill="white" font-size="11">ND</text>
    
    <rect class="state coming" x="85" y="20" width="60" height="40" rx="4"/> <!-- MI -->
    <text x="115" y="45" text-anchor="middle" fill="white" font-size="12">MI</text>
    
    <rect class="state coming" x="-70" y="55" width="70" height="45" rx="4"/> <!-- IA -->
    <text x="-35" y="82" text-anchor="middle" fill="white" font-size="13">IA</text>
    
    <rect class="state coming" x="20" y="55" width="60" height="45" rx="4"/> <!-- IL -->
    <text x="50" y="82" text-anchor="middle" fill="white" font-size="13">IL</text>
    
    <rect class="state coming" x="85" y="65" width="55" height="35" rx="4"/> <!-- IN -->
    <text x="112" y="88" text-anchor="middle" fill="white" font-size="11">IN</text>
    
    <rect class="state coming" x="90" y="105" width="50" height="40" rx="4"/> <!-- OH -->
    <text x="115" y="130" text-anchor="middle" fill="white" font-size="12">OH</text>
  </g>
  
  <!-- South Group -->
  <g transform="translate(350, 200)">
    <!-- Kentucky -->
    <rect class="state coming" x="80" y="50" width="70" height="45" rx="4"/>
    <text x="115" y="77" text-anchor="middle" fill="white" font-size="12">KY</text>
    
    <!-- West Virginia -->
    <rect class="state coming" x="155" y="40" width="50" height="40" rx="4"/>
    <text x="180" y="65" text-anchor="middle" fill="white" font-size="10">WV</text>
    
    <!-- Virginia -->
    <rect class="state coming" x="210" y="30" width="60" height="50" rx="4"/>
    <text x="240" y="60" text-anchor="middle" fill="white" font-size="12">VA</text>
    
    <!-- North Carolina -->
    <rect class="state coming" x="210" y="85" width="70" height="40" rx="4"/>
    <text x="245" y="110" text-anchor="middle" fill="white" font-size="11">NC</text>
    
    <!-- South Carolina -->
    <rect class="state coming" x="215" y="130" width="55" height="40" rx="4"/>
    <text x="242" y="155" text-anchor="middle" fill="white" font-size="10">SC</text>
    
    <!-- Louisiana -->
    <rect class="state coming" x="-30" y="180" width="70" height="45" rx="4"/>
    <text x="5" y="207" text-anchor="middle" fill="white" font-size="12">LA</text>
  </g>
  
  <!-- Southwest -->
  <g transform="translate(180, 220)">
    <rect class="state coming" x="0" y="0" width="70" height="55" rx="4"/> <!-- OK -->
    <text x="35" y="32" text-anchor="middle" fill="white" font-size="13">OK</text>
    
    <rect class="state coming" x="-30" y="60" width="90" height="70" rx="4"/> <!-- TX -->
    <text x="15" y="100" text-anchor="middle" fill="white" font-size="16">TX</text>
    
    <rect class="state coming" x="-100" y="10" width="70" height="60" rx="4"/> <!-- NM -->
    <text x="-65" y="45" text-anchor="middle" fill="white" font-size="13">NM</text>
  </g>
  
  <!-- FLORIDA - LIVE NOW (Gold with pulse) -->
  <g transform="translate(420, 300)" class="pulse">
    <rect class="state live" x="0" y="0" width="120" height="90" rx="6"/>
    <text x="60" y="40" text-anchor="middle" fill="#1a3a5c" font-size="28" font-weight="700">FL</text>
    <text x="60" y="65" text-anchor="middle" fill="#1a3a5c" font-size="10" font-weight="600">LIVE NOW</text>
    <!-- Pulsing indicator -->
    <circle cx="60" cy="80" r="4" fill="#1a3a5c"/>
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Hawaii -->
  <g transform="translate(80, 380)">
    <ellipse class="state coming" cx="40" cy="25" rx="70" ry="30"/>
    <text x="40" y="30" text-anchor="middle" fill="white" font-size="14">HI</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="25" height="20" fill="#c9a227" rx="3"/>
    <text x="35" y="15" fill="#1a3a5c" font-size="13" font-weight="600">Live Now (Florida)</text>
    
    <rect x="200" y="0" width="25" height="20" fill="#2d5a3d" rx="3"/>
    <text x="235" y="15" fill="#1a3a5c" font-size="13">Coming 2024-2025</text>
  </g>
</svg>
